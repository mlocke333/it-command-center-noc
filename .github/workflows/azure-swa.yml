name: Deploy to Azure Static Web Apps

# Alternative to the GitHub Pages workflow — use ONE deploy target, not both.
# This builds the Vite frontend AND deploys the /api managed Functions.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          # Frontend served from repo root; built output in dist.
          app_location: "/"
          output_location: "dist"
          # Managed Azure Functions backend.
          api_location: "api"
